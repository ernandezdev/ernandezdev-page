<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ernandezdev</title>

    <!-- Inter -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Space Grotesk -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />

    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>ernandezdev</h1>

      <div class="stack-tag">
        <span class="typing">full stack developer</span>
      </div>

      <div class="social-links">
        <button
          onclick="openLink('https://linkedin.com')"
          aria-label="LinkedIn"
        >
          <i data-lucide="linkedin"></i>
        </button>

        <button
          onclick="openLink('https://github.com/ernandezdev')"
          aria-label="GitHub"
        >
          <i data-lucide="github"></i>
        </button>

        <button onclick="sendEmail()" aria-label="Email">
          <i data-lucide="mail"></i>
        </button>
      </div>

      <footer>© 2025 ernandezdev</footer>
    </div>

    <!-- JS externo -->
    <script src="script.js"></script>
  </body>
</html>
